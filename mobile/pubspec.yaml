name: censo_viviendas_fallas
description: App móvil para censo de viviendas sobre fallas geológicas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # mapas
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # API
  http: ^1.2.0
  provider: ^6.1.2

  # almacenamiento
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # ubicación GPS
  geolocator: ^10.1.1

  # fotos
  image_picker: ^1.0.8

  # utilidades
  uuid: ^4.3.3
  intl: ^0.19.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true